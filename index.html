<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <article data-testid="test-profile-card" class="card">
        <!--Header-->

        <header>
            <h2 data-testid="test-user-name">Ubani Success Isioma</h2>
        </header>

        <!--image-->
        <figure>
            <img src="images/SUCCESS AI.jpeg" alt="Profile photo of Success"
                data-testid="test-user-avatar">
        </figure>

        <!--Bio-->
        <p data-testid="test-user-bio">
            I am a web developer, who is passionate about building websites, i am learning how to build modern applications
        </p>

        <!--Time-->
        <p data-testid="test-user-time" id="time"></p>

        <!--Social Links-->
        <nav data-testid="test-user-social-links">
            <ul>
                <!--linkedin-->
                <li>
                    <a href="https://www.linkedin.com/in/ubani-success/" target="_blank"
                        rel="noopener noreferrer" data-testid="test-user-social-linkedin">
                        linkedin
                    </a>
                </li>

                <!--github-->
                <li>
                    <a href="https://github.com/ISIOMA123123" target="_blank" rel="noopener noreferrer" data-testid="test-user-github">
                        Github
                    </a>
                </li>
            </ul>
        </nav>

        <!--hobbies-->
        <section>
            <h3>Hobbies</h3>
            <ul data-testid="test-user-hobbies">
                <li>Coding</li>
                <li>Music</li>
                <li>Reading</li>
            </ul>
        </section>

        <!--Dislikes-->
        <section>
            <h3>Dislikes</h3>
            <ul data-testid="test-user-dislikes">
                <li>Bugs</li>
                <li>Slow Internet</li>
            </ul>
        </section>
    </article>

    <script src="script.js"></script>

</body>
</html>
